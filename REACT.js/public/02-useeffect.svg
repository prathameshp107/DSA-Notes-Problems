<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240">
  <rect width="700" height="240" fill="#f8fafc" rx="12"/>

  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="30" y="60" width="130" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95" y="84" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1e40af">1. Render</text>
  <text x="95" y="103" text-anchor="middle" font-family="Arial" font-size="11" fill="#3b82f6">Component runs</text>
  <line x1="160" y1="87" x2="195" y2="87" stroke="#64748b" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Step 2 -->
  <rect x="195" y="60" width="140" height="55" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="265" y="84" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#166534">2. Paint</text>
  <text x="265" y="103" text-anchor="middle" font-family="Arial" font-size="11" fill="#16a34a">Browser shows UI</text>
  <line x1="335" y1="87" x2="370" y2="87" stroke="#64748b" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Step 3 useEffect -->
  <rect x="370" y="45" width="150" height="85" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="445" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#9d174d">3. useEffect</text>
  <text x="445" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#be185d">Fetch data</text>
  <text x="445" y="107" text-anchor="middle" font-family="Arial" font-size="11" fill="#be185d">Set timer, subscribe</text>
  <line x1="520" y1="87" x2="560" y2="87" stroke="#64748b" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Cleanup -->
  <rect x="560" y="60" width="110" height="55" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="615" y="83" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#9a3412">Cleanup</text>
  <text x="615" y="101" text-anchor="middle" font-family="Arial" font-size="11" fill="#ea580c">return () => {}</text>

  <!-- Dependency box -->
  <rect x="195" y="150" width="310" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="350" y="172" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#334155">Dependency Array [ ]</text>
  <text x="350" y="195" text-anchor="middle" font-family="Arial" font-size="11" fill="#64748b">[] = run once | [x] = run when x changes | none = run every render</text>

  <text x="350" y="228" text-anchor="middle" font-family="Arial" font-size="11" fill="#94a3b8">useEffect runs AFTER the browser paints — keeps UI fast</text>
</svg>
