  <text fill="#0F6E56" font-size="11" font-family="monospace" text-anchor="middle" y="174" x="340">single source of truth</text>

  
  <rect stroke-width="0.5" stroke="#534AB7" fill="#EEEDFE" rx="8" height="50" width="160" y="20" x="30"></rect>
