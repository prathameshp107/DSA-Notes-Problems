  <text fill="#534AB7" font-size="11" font-family="monospace" text-anchor="middle" y="58" x="570">reads user name</text>
  <line marker-end="url(#arr2)" stroke-dasharray="4 3" stroke-width="1" stroke="#1D9E75" y2="130" x2="428" y1="45" x1="490"></line>

  
  <rect stroke-width="0.5" stroke="#534AB7" fill="#EEEDFE" rx="8" height="50" width="160" y="220" x="30"></rect>
