  <text fill="#534AB7" font-size="11" font-family="monospace" text-anchor="middle" y="258" x="110">reads + updates cart</text>
  <line marker-end="url(#arr2)" stroke-dasharray="4 3" stroke-width="1" stroke="#1D9E75" y2="192" x2="252" y1="245" x1="190"></line>

  
  <rect stroke-width="0.5" stroke="#534AB7" fill="#EEEDFE" rx="8" height="50" width="160" y="220" x="490"></rect>
  <text font-weight="500" fill="#3C3489" font-size="13" font-family="monospace" text-anchor="middle" y="240" x="570">Settings</text>
  <text fill="#534AB7" font-size="11" font-family="monospace" text-anchor="middle" y="258" x="570">reads + updates theme</text>
  <line marker-end="url(#arr2)" stroke-dasharray="4 3" stroke-width="1" stroke="#1D9E75" y2="192" x2="428" y1="245" x1="490"></line>

