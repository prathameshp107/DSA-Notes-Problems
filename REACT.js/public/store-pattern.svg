<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" width="100%">
  <defs>
    <marker orient="auto-start-reverse" markerHeight="6" markerWidth="6" refY="5" refX="8" viewBox="0 0 10 10" id="arr2">
      <path stroke-linejoin="round" stroke-linecap="round" stroke-width="1.5" stroke="#0F6E56" fill="none" d="M2 1L8 5L2 9"></path>
    </marker>
  </defs>
  
  <rect stroke-width="1.5" stroke="#0F6E56" fill="#E1F5EE" rx="12" height="80" width="170" y="110" x="255"></rect>
  <text font-weight="500" fill="#085041" font-size="14" font-family="monospace" text-anchor="middle" y="138" x="340">STORE</text>
