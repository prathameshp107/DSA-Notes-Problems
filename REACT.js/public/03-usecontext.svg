<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280">
  <rect width="700" height="280" fill="#f8fafc" rx="12"/>

  <!-- Without Context label -->
  <text x="175" y="28" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#dc2626">Without Context (prop drilling)</text>

  <!-- App -->
  <rect x="60" y="45" width="230" height="40" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="175" y="70" text-anchor="middle" font-family="Arial" font-size="13" fill="#991b1b">App — has theme data</text>
  <line x1="175" y1="85" x2="175" y2="105" stroke="#dc2626" stroke-width="1.5"/>
  <text x="205" y="100" font-family="Arial" font-size="10" fill="#dc2626">pass theme prop</text>

  <!-- Parent -->
  <rect x="60" y="105" width="230" height="40" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="175" y="130" text-anchor="middle" font-family="Arial" font-size="13" fill="#991b1b">Parent — just passes it down</text>
  <line x1="175" y1="145" x2="175" y2="165" stroke="#dc2626" stroke-width="1.5"/>
  <text x="205" y="160" font-family="Arial" font-size="10" fill="#dc2626">pass theme prop</text>

  <!-- Child -->
  <rect x="60" y="165" width="230" height="40" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="175" y="190" text-anchor="middle" font-family="Arial" font-size="13" fill="#991b1b">Child — finally uses theme</text>

  <text x="175" y="240" text-anchor="middle" font-family="Arial" font-size="12" fill="#dc2626">Every middle component must pass the prop!</text>

  <!-- Divider -->
  <line x1="350" y1="20" x2="350" y2="260" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- With Context label -->
  <text x="530" y="28" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#16a34a">With useContext (no drilling)</text>

  <!-- Provider wraps all -->
  <rect x="390" y="40" width="275" height="200" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="527" y="62" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#166534">ThemeContext.Provider value="dark"</text>

  <!-- App -->
  <rect x="410" y="75" width="235" height="35" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="527" y="97" text-anchor="middle" font-family="Arial" font-size="12" fill="#166534">App</text>

  <!-- Parent -->
  <rect x="410" y="125" width="235" height="35" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="527" y="147" text-anchor="middle" font-family="Arial" font-size="12" fill="#166534">Parent — no props needed</text>

  <!-- Child -->
  <rect x="410" y="175" width="235" height="40" rx="8" fill="#4ade80" stroke="#16a34a" stroke-width="2"/>
  <text x="527" y="199" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#166534">Child — useContext(ThemeCtx)</text>

  <text x="527" y="260" text-anchor="middle" font-family="Arial" font-size="12" fill="#16a34a">Direct access, no middle steps!</text>

  <text x="350" y="275" text-anchor="middle" font-family="Arial" font-size="11" fill="#94a3b8">Context skips the chain — any nested component can read it directly</text>
</svg>
