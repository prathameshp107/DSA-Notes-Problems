<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" width="100%">
  
  <rect stroke-width="0.5" stroke="#534AB7" fill="#EEEDFE" rx="8" height="40" width="290" y="20" x="30"></rect>
  <text font-weight="500" fill="#3C3489" font-size="14" font-family="monospace" text-anchor="middle" y="45" x="175">Redux (Toolkit)</text>

  <rect stroke-width="0.5" stroke="#0F6E56" fill="#E1F5EE" rx="8" height="40" width="290" y="20" x="360"></rect>
  <text font-weight="500" fill="#085041" font-size="14" font-family="monospace" text-anchor="middle" y="45" x="505">Zustand</text>

  
  <rect stroke-width="0.5" stroke="#B4B2A9" fill="#F1EFE8" rx="6" height="50" width="290" y="80" x="30"></rect>
  <text font-weight="500" fill="#444441" font-size="12" font-family="monospace" text-anchor="middle" y="100" x="175">Setup complexity</text>
  <text fill="#5F5E5A" font-size="11" font-family="monospace" text-anchor="middle" y="118" x="175">store + slice + Provider + hooks</text>

  <rect stroke-width="0.5" stroke="#B4B2A9" fill="#F1EFE8" rx="6" height="50" width="290" y="80" x="360"></rect>
  <text font-weight="500" fill="#444441" font-size="12" font-family="monospace" text-anchor="middle" y="100" x="505">Setup complexity</text>
  <text fill="#1D9E75" font-size="11" font-family="monospace" text-anchor="middle" y="118" x="505">create() — that's it. No Provider.</text>

  
  <rect stroke-width="0.5" stroke="#B4B2A9" fill="#F1EFE8" rx="6" height="50" width="290" y="148" x="30"></rect>
  <text font-weight="500" fill="#444441" font-size="12" font-family="monospace" text-anchor="middle" y="168" x="175">Boilerplate</text>
  <text fill="#5F5E5A" font-size="11" font-family="monospace" text-anchor="middle" y="186" x="175">Medium (RTK reduces it a lot)</text>

  <rect stroke-width="0.5" stroke="#B4B2A9" fill="#F1EFE8" rx="6" height="50" width="290" y="148" x="360"></rect>
  <text font-weight="500" fill="#444441" font-size="12" font-family="monospace" text-anchor="middle" y="168" x="505">Boilerplate</text>
  <text fill="#1D9E75" font-size="11" font-family="monospace" text-anchor="middle" y="186" x="505">Minimal — state &amp; actions together</text>

  
  <rect stroke-width="0.5" stroke="#B4B2A9" fill="#F1EFE8" rx="6" height="50" width="290" y="216" x="30"></rect>
  <text font-weight="500" fill="#444441" font-size="12" font-family="monospace" text-anchor="middle" y="236" x="175">DevTools / Debugging</text>
  <text fill="#1D9E75" font-size="11" font-family="monospace" text-anchor="middle" y="254" x="175">Excellent — time-travel debugging</text>

  <rect stroke-width="0.5" stroke="#B4B2A9" fill="#F1EFE8" rx="6" height="50" width="290" y="216" x="360"></rect>
  <text font-weight="500" fill="#444441" font-size="12" font-family="monospace" text-anchor="middle" y="236" x="505">DevTools / Debugging</text>
  <text fill="#5F5E5A" font-size="11" font-family="monospace" text-anchor="middle" y="254" x="505">Good (with middleware)</text>

  
  <rect stroke-width="0.5" stroke="#534AB7" fill="#EEEDFE" rx="6" height="60" width="290" y="284" x="30"></rect>
  <text font-weight="500" fill="#3C3489" font-size="12" font-family="monospace" text-anchor="middle" y="306" x="175">Best for</text>
  <text fill="#534AB7" font-size="11" font-family="monospace" text-anchor="middle" y="324" x="175">Large apps, teams, complex</text>
  <text fill="#534AB7" font-size="11" font-family="monospace" text-anchor="middle" y="340" x="175">logic, strict patterns</text>

  <rect stroke-width="0.5" stroke="#0F6E56" fill="#E1F5EE" rx="6" height="60" width="290" y="284" x="360"></rect>
  <text font-weight="500" fill="#085041" font-size="12" font-family="monospace" text-anchor="middle" y="306" x="505">Best for</text>
  <text fill="#0F6E56" font-size="11" font-family="monospace" text-anchor="middle" y="324" x="505">Small-medium apps, fast setup,</text>
  <text fill="#0F6E56" font-size="11" font-family="monospace" text-anchor="middle" y="340" x="505">minimal boilerplate</text>
</svg>
