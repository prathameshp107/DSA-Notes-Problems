<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 210">
  <rect width="700" height="210" fill="#f8fafc" rx="12"/>

  <defs>
    <marker id="ma1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ma2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ma3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Re-render box -->
  <rect x="20" y="65" width="140" height="75" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="93" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1e40af">Re-render</text>
  <text x="90" y="111" text-anchor="middle" font-family="Arial" font-size="11" fill="#3b82f6">Something else</text>
  <text x="90" y="128" text-anchor="middle" font-family="Arial" font-size="11" fill="#3b82f6">changed in app</text>

  <line x1="160" y1="102" x2="195" y2="102" stroke="#64748b" stroke-width="2" marker-end="url(#ma1)"/>

  <!-- useMemo check box -->
  <rect x="195" y="45" width="170" height="115" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="280" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#854d0e">useMemo check</text>
  <text x="280" y="93" text-anchor="middle" font-family="Arial" font-size="12" fill="#92400e">Did deps change?</text>
  <line x1="215" y1="105" x2="345" y2="105" stroke="#ca8a04" stroke-width="1"/>
  <text x="280" y="122" text-anchor="middle" font-family="Arial" font-size="11" fill="#059669">NO  →  use cache</text>
  <text x="280" y="140" text-anchor="middle" font-family="Arial" font-size="11" fill="#dc2626">YES →  recalculate</text>

  <!-- Arrow to cached -->
  <line x1="365" y1="80" x2="410" y2="80" stroke="#16a34a" stroke-width="2" marker-end="url(#ma2)"/>

  <!-- Cached result -->
  <rect x="410" y="52" width="260" height="55" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="540" y="76" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#166534">Cached result — returned instantly</text>
  <text x="540" y="96" text-anchor="middle" font-family="Arial" font-size="11" fill="#16a34a">No recalculation. Fast!</text>

  <!-- Arrow to recalculate -->
  <line x1="365" y1="135" x2="410" y2="135" stroke="#dc2626" stroke-width="2" marker-end="url(#ma3)"/>

  <!-- Recalculate -->
  <rect x="410" y="110" width="260" height="55" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="540" y="134" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#991b1b">Recalculate and cache new result</text>
  <text x="540" y="153" text-anchor="middle" font-family="Arial" font-size="11" fill="#dc2626">Runs the expensive function once</text>

  <text x="350" y="196" text-anchor="middle" font-family="Arial" font-size="11" fill="#94a3b8">useMemo = smart cache for expensive calculations — recalculates only when deps change</text>
</svg>
