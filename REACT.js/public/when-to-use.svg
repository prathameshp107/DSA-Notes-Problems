<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" width="100%">
  <defs>
    <marker orient="auto-start-reverse" markerHeight="6" markerWidth="6" refY="5" refX="8" viewBox="0 0 10 10" id="arrc">
      <path stroke-linejoin="round" stroke-linecap="round" stroke-width="1.5" stroke="#888780" fill="none" d="M2 1L8 5L2 9"></path>
    </marker>
  </defs>
  
  <polygon stroke-width="0.5" stroke="#854F0B" fill="#FAEEDA" points="340,20 470,80 340,140 210,80"></polygon>
  <text font-weight="500" fill="#633806" font-size="12" font-family="monospace" text-anchor="middle" y="74" x="340">Large app with</text>
  <text fill="#633806" font-size="12" font-family="monospace" text-anchor="middle" y="92" x="340">big team?</text>

  
  <line marker-end="url(#arrc)" stroke-width="1" stroke="#888780" y2="80" x2="570" y1="80" x1="470"></line>
  <text fill="#639922" font-size="11" font-family="monospace" text-anchor="middle" y="72" x="520">YES</text>
  <rect stroke-width="0.5" stroke="#534AB7" fill="#EEEDFE" rx="8" height="50" width="90" y="55" x="570"></rect>
  <text font-weight="500" fill="#3C3489" font-size="12" font-family="monospace" text-anchor="middle" y="78" x="615">Redux</text>
  <text fill="#534AB7" font-size="10" font-family="monospace" text-anchor="middle" y="96" x="615">Toolkit</text>

  
  <line marker-end="url(#arrc)" stroke-width="1" stroke="#888780" y2="80" x2="110" y1="80" x1="210"></line>
  <text fill="#E24B4A" font-size="11" font-family="monospace" text-anchor="middle" y="72" x="160">NO</text>
  <rect stroke-width="0.5" stroke="#0F6E56" fill="#E1F5EE" rx="8" height="50" width="90" y="55" x="20"></rect>
  <text font-weight="500" fill="#085041" font-size="12" font-family="monospace" text-anchor="middle" y="78" x="65">Zustand</text>
  <text fill="#0F6E56" font-size="10" font-family="monospace" text-anchor="middle" y="96" x="65">simpler!</text>

  
  <rect stroke-width="0.5" stroke="#B4B2A9" fill="#F1EFE8" rx="8" height="45" width="480" y="160" x="100"></rect>
  <text font-weight="500" fill="#444441" font-size="12" font-family="monospace" text-anchor="middle" y="180" x="340">Rule of thumb:</text>
  <text fill="#5F5E5A" font-size="11" font-family="monospace" text-anchor="middle" y="196" x="340">Start with Zustand. Migrate to Redux if the app grows really complex.</text>
</svg>
