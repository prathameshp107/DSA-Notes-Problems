<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230">
  <rect width="700" height="230" fill="#f8fafc" rx="12"/>

  <defs>
    <marker id="ref1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Use Case 1 title -->
  <text x="175" y="28" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#0369a1">Use Case 1: Access DOM Elements</text>

  <rect x="20" y="42" width="175" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="107" y="64" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1e40af">inputRef = useRef()</text>
  <text x="107" y="83" text-anchor="middle" font-family="Arial" font-size="11" fill="#3b82f6">&lt;input ref={inputRef}/&gt;</text>

  <line x1="195" y1="69" x2="230" y2="69" stroke="#64748b" stroke-width="2" marker-end="url(#ref1)"/>

  <rect x="230" y="42" width="160" height="55" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="310" y="63" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#166534">inputRef.current</text>
  <text x="310" y="83" text-anchor="middle" font-family="Arial" font-size="11" fill="#16a34a">= real DOM &lt;input&gt;</text>

  <line x1="390" y1="69" x2="425" y2="69" stroke="#64748b" stroke-width="2" marker-end="url(#ref1)"/>

  <rect x="425" y="42" width="245" height="55" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="547" y="63" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#854d0e">.focus() / .value / .click()</text>
  <text x="547" y="83" text-anchor="middle" font-family="Arial" font-size="11" fill="#ca8a04">directly control the element</text>

  <!-- Use Case 2 title -->
  <text x="175" y="130" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#7c3aed">Use Case 2: Store Value Without Re-render</text>

  <rect x="20" y="145" width="200" height="55" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="120" y="167" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#5b21b6">count = useRef(0)</text>
  <text x="120" y="187" text-anchor="middle" font-family="Arial" font-size="11" fill="#7c3aed">count.current++  (silent)</text>

  <rect x="255" y="150" width="420" height="45" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="465" y="170" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#334155">No re-render triggered!</text>
  <text x="465" y="187" text-anchor="middle" font-family="Arial" font-size="11" fill="#64748b">Value changes silently in memory</text>

  <text x="350" y="220" text-anchor="middle" font-family="Arial" font-size="11" fill="#94a3b8">useRef = a mutable box that survives re-renders but does not cause them</text>
</svg>
