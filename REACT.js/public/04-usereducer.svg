<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220">
  <rect width="700" height="220" fill="#f8fafc" rx="12"/>

  <defs>
    <marker id="ra1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ra3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Component -->
  <rect x="30" y="65" width="140" height="85" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="92" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1e40af">Component</text>
  <text x="100" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="#3b82f6">dispatch({</text>
  <text x="100" y="128" text-anchor="middle" font-family="Arial" font-size="11" fill="#3b82f6">  type:'inc'</text>
  <text x="100" y="144" text-anchor="middle" font-family="Arial" font-size="11" fill="#3b82f6">})</text>

  <line x1="170" y1="107" x2="210" y2="107" stroke="#64748b" stroke-width="2" marker-end="url(#ra1)"/>
  <text x="190" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#64748b">action</text>

  <!-- Reducer -->
  <rect x="210" y="50" width="170" height="115" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="295" y="76" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#9d174d">Reducer function</text>
  <text x="295" y="96" text-anchor="middle" font-family="Arial" font-size="11" fill="#be185d">switch(action.type)</text>
  <text x="295" y="113" text-anchor="middle" font-family="Arial" font-size="11" fill="#be185d">'inc'  → state + 1</text>
  <text x="295" y="129" text-anchor="middle" font-family="Arial" font-size="11" fill="#be185d">'dec'  → state - 1</text>
  <text x="295" y="145" text-anchor="middle" font-family="Arial" font-size="11" fill="#be185d">'reset'→ 0</text>

  <line x1="380" y1="107" x2="420" y2="107" stroke="#64748b" stroke-width="2" marker-end="url(#ra1)"/>
  <text x="400" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#64748b">new state</text>

  <!-- New State -->
  <rect x="420" y="65" width="150" height="85" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="495" y="92" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#166534">New State</text>
  <text x="495" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="#16a34a">count = 1</text>
  <text x="495" y="130" text-anchor="middle" font-family="Arial" font-size="11" fill="#16a34a">UI re-renders</text>

  <!-- Feedback loop -->
  <path d="M570 150 Q630 185 630 107 Q630 30 495 30 Q360 30 295 45" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ra3)"/>
  <text x="620" y="178" text-anchor="middle" font-family="Arial" font-size="10" fill="#94a3b8">re-render</text>

  <text x="350" y="208" text-anchor="middle" font-family="Arial" font-size="11" fill="#94a3b8">dispatch sends actions → reducer returns new state → UI updates</text>
</svg>
