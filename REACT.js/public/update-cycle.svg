<svg aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="100%">
  <title>React Reconciliation Flow</title>
  <desc>From state change to screen update using Virtual DOM</desc>
  <defs>
    <marker orient="auto-start-reverse" markerHeight="6" markerWidth="6" refY="5" refX="8" viewBox="0 0 10 10" id="arrow">
      <path stroke-linejoin="round" stroke-linecap="round" stroke-width="1.5" stroke="#666" fill="none" d="M2 1L8 5L2 9"></path>
    </marker>
  </defs>

  
  <rect stroke-width="2" stroke="#7c3aed" fill="#f3f0ff" rx="12" height="68" width="240" y="20" x="240"></rect>
  <text font-family="system-ui, sans-serif" fill="#5b21b6" font-weight="700" font-size="15" text-anchor="middle" y="44" x="360">1. State / Props Change</text>
  <text font-family="system-ui, sans-serif" fill="#6d28d9" font-size="12.5" text-anchor="middle" y="63" x="360">setState() • useState • new props</text>

  
  <path marker-end="url(#arrow)" stroke-dasharray="4 3" stroke-width="2" stroke="#94a3b8" fill="none" d="M360 88 L360 115 L160 115 L160 138"></path>
  <path marker-end="url(#arrow)" stroke-dasharray="4 3" stroke-width="2" stroke="#94a3b8" fill="none" d="M360 88 L360 115 L560 115 L560 138"></path>

  
  <rect stroke-width="2.5" stroke="#14b8a6" fill="#f0fdfa" rx="12" height="92" width="250" y="138" x="30"></rect>
  <text font-family="system-ui, sans-serif" fill="#0f766e" font-weight="700" font-size="14.5" text-anchor="middle" y="158" x="155">2a. Virtual DOM (Previous)</text>
  <rect stroke="#14b8a6" fill="#e6fffa" rx="4" height="19" width="210" y="175" x="50"></rect>
  <text font-family="monospace" fill="#0f766e" font-size="11.5" text-anchor="middle" y="188" x="155">&lt;li&gt;Item A&lt;/li&gt;</text>
  <rect stroke="#14b8a6" fill="#e6fffa" rx="4" height="19" width="210" y="198" x="50"></rect>
  <text font-family="monospace" fill="#0f766e" font-size="11.5" text-anchor="middle" y="211" x="155">&lt;li&gt;Item B - $20&lt;/li&gt;</text>

  
  <rect stroke-width="2.5" stroke="#14b8a6" fill="#f0fdfa" rx="12" height="92" width="250" y="138" x="440"></rect>
  <text font-family="system-ui, sans-serif" fill="#0f766e" font-weight="700" font-size="14.5" text-anchor="middle" y="158" x="565">2b. Virtual DOM (Next)</text>
  <rect stroke="#14b8a6" fill="#e6fffa" rx="4" height="19" width="210" y="175" x="460"></rect>
  <text font-family="monospace" fill="#0f766e" font-size="11.5" text-anchor="middle" y="188" x="565">&lt;li&gt;Item A&lt;/li&gt;</text>
  <rect stroke-width="1.5" stroke="#f59e0b" fill="#fef3c7" rx="4" height="19" width="210" y="198" x="460"></rect>
  <text font-family="monospace" fill="#d97706" font-size="11.5" text-anchor="middle" y="211" x="565">&lt;li&gt;Item B - $25&lt;/li&gt;</text>

  
  <line marker-end="url(#arrow)" stroke-width="2" stroke="#94a3b8" y2="184" x2="440" y1="184" x1="280"></line>
  <rect stroke-width="1.5" stroke="#fbbf24" fill="#fffbeb" rx="8" height="32" width="110" y="165" x="305"></rect>
  <text font-family="system-ui, sans-serif" fill="#d97706" font-weight="700" font-size="13.5" text-anchor="middle" y="183" x="360">3. Diff / Reconcile</text>

  <line marker-end="url(#arrow)" stroke-width="2" stroke="#64748b" y2="265" x2="360" y1="230" x1="360"></line>

  
  <rect stroke-width="2.5" stroke="#fb923c" fill="#fff1ee" rx="12" height="72" width="300" y="270" x="210"></rect>
  <text font-family="system-ui, sans-serif" fill="#ea580c" font-weight="700" font-size="14.5" text-anchor="middle" y="295" x="360">4. Minimal Patch Calculated</text>
  <text font-family="system-ui, sans-serif" fill="#f97316" font-size="12.5" text-anchor="middle" y="317" x="360">Only the changed text node is updated</text>

  <line marker-end="url(#arrow)" stroke-width="2" stroke="#64748b" y2="375" x2="360" y1="342" x1="360"></line>

  
  <rect stroke-width="2.5" stroke="#3b82f6" fill="#dbeafe" rx="12" height="72" width="350" y="380" x="185"></rect>
  <text font-family="system-ui, sans-serif" fill="#1e40af" font-weight="700" font-size="14.5" text-anchor="middle" y="405" x="360">5. Real DOM Update (Batched)</text>
  <text font-family="system-ui, sans-serif" fill="#2563eb" font-size="12.5" text-anchor="middle" y="427" x="360">Browser only repaints the changed part</text>

  <line marker-end="url(#arrow)" stroke-width="2" stroke="#64748b" y2="480" x2="360" y1="452" x1="360"></line>

  
  <rect stroke-width="2.5" stroke="#4ade80" fill="#f0fdf4" rx="12" height="55" width="180" y="485" x="270"></rect>
  <text font-family="system-ui, sans-serif" fill="#15803d" font-weight="700" font-size="14.5" text-anchor="middle" y="507" x="360">6. Screen Updated</text>
  <text font-family="system-ui, sans-serif" fill="#22c55e" font-size="12" text-anchor="middle" y="525" x="360">User sees the new UI</text>
</svg>
