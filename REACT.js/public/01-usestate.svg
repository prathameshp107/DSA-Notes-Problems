<svg fill="none" viewBox="0 0 740 270" height="270" width="740" xmlns="http://www.w3.org/2000/svg">
  
  <rect fill="#f8fafc" rx="16" height="270" width="740"></rect>

  
  <text fill="#1e2937" font-weight="700" font-size="22" font-family="Arial, sans-serif" text-anchor="middle" y="38" x="370">
    How useState Works in React
  </text>

  
  <rect stroke-width="3" stroke="#3b82f6" fill="#dbeafe" rx="12" height="100" width="200" y="80" x="50"></rect>
  <text fill="#1e40af" font-weight="700" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" y="115" x="150">useState(0)</text>
  <text fill="#64748b" font-size="13" font-family="Arial, sans-serif" text-anchor="middle" y="138" x="150">Hook Declaration</text>
  <text fill="#64748b" font-size="11" font-family="Arial, sans-serif" text-anchor="middle" y="155" x="150">(in your component)</text>

  
  <line marker-end="url(#arrow)" class="flow-arrow" stroke-dasharray="12 8" stroke-width="3" stroke="#64748b" y2="130" x2="310" y1="130" x1="250"></line>

  
  <rect stroke-width="2.5" stroke="#475569" fill="#f1f5f9" rx="12" height="130" width="220" y="65" x="320"></rect>

  
  <rect stroke-width="2.5" stroke="#16a34a" fill="#dcfce7" rx="10" height="48" width="180" y="80" x="340"></rect>
  <text fill="#166534" font-weight="700" font-size="17" font-family="Arial, sans-serif" text-anchor="middle" y="105" x="430">count = 0</text>
  <text fill="#4ade80" font-size="11.5" font-family="Arial, sans-serif" text-anchor="middle" y="122" x="430">Current State Value</text>

  
  <rect stroke-width="2.5" stroke="#eab308" fill="#fef9c3" rx="10" height="48" width="180" y="140" x="340"></rect>
  <text fill="#854d0e" font-weight="700" font-size="17" font-family="Arial, sans-serif" text-anchor="middle" y="165" x="430">setCount(newValue)</text>
  <text fill="#facc15" font-size="11.5" font-family="Arial, sans-serif" text-anchor="middle" y="182" x="430">State Updater Function</text>

  
  <line marker-end="url(#arrow)" class="flow-arrow" stroke-dasharray="12 8" stroke-width="3" stroke="#64748b" y2="165" x2="580" y1="165" x1="520"></line>

  
  <rect class="re-render-box" stroke-width="3" stroke="#db2777" fill="#fce7f3" rx="12" height="100" width="120" y="80" x="590"></rect>
  <text fill="#9d174d" font-weight="700" font-size="19" font-family="Arial, sans-serif" text-anchor="middle" y="118" x="650">🔄 Re-render</text>
  <text fill="#e11d48" font-size="13" font-family="Arial, sans-serif" text-anchor="middle" y="142" x="650">Component runs again</text>
  <text fill="#e11d48" font-size="13" font-family="Arial, sans-serif" text-anchor="middle" y="157" x="650">UI updates on screen</text>

  
  <rect stroke-width="2" stroke="#e2e8f0" fill="#f1f5f9" rx="10" height="42" width="640" y="205" x="50"></rect>
  <text fill="#475569" font-size="13" font-family="Arial, sans-serif" text-anchor="middle" y="228" x="370">
    useState returns <tspan fill="#3b82f6" font-weight="700">[value, setter]</tspan> — 
    <tspan fill="#db2777" font-weight="700">Calling setter</tspan> triggers re-render
  </text>

  
  <defs>
    
    <marker orient="auto" markerHeight="5" markerWidth="5" refY="6" refX="10" viewBox="0 0 12 12" id="arrow">
      <path fill="#64748b" d="M2 2 L10 6 L2 10 Z"></path>
    </marker>

    
    <style>
      @keyframes flow {
        from { stroke-dashoffset: 0; }
        to   { stroke-dashoffset: -20; }
      }

      .flow-arrow {
        animation: flow 900ms linear infinite;
      }

      @keyframes pulse-re-render {
        0%, 100% {
          stroke: #db2777;
          stroke-width: 3;
        }
        50% {
          stroke: #e11d48;
          stroke-width: 5.5;
        }
      }

      .re-render-box {
        animation: pulse-re-render 1200ms ease-in-out infinite;
      }
    </style>
  </defs>
</svg>
