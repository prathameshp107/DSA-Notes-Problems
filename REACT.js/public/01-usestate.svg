  <text x="130" y="95" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#1e40af">useState(0)</text>
  <text x="130" y="118" text-anchor="middle" font-family="Arial" font-size="12" fill="#3b82f6">Initial Value</text>

  <defs>
    <marker id="arr1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <line x1="220" y1="100" x2="270" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arr1)"/>

  <rect x="270" y="55" width="130" height="40" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="335" y="80" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#166534">count = 0</text>

  <rect x="270" y="105" width="130" height="40" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="335" y="130" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#854d0e">setCount()</text>

  <line x1="400" y1="125" x2="450" y2="125" stroke="#64748b" stroke-width="2" marker-end="url(#arr1)"/>

  <rect x="450" y="60" width="200" height="80" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="550" y="95" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#9d174d">Re-render!</text>
  <text x="550" y="115" text-anchor="middle" font-family="Arial" font-size="11" fill="#be185d">UI updates on screen</text>

  <text x="350" y="185" text-anchor="middle" font-family="Arial" font-size="12" fill="#64748b">useState returns [value, setter] — change setter → screen updates</text>
