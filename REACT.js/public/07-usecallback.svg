<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 215">
  <rect width="700" height="215" fill="#f8fafc" rx="12"/>

  <defs>
    <marker id="cb1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="cb2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Labels -->
  <text x="175" y="28" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#dc2626">Without useCallback</text>
  <text x="530" y="28" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#16a34a">With useCallback</text>

  <!-- Without: Parent renders -->
  <rect x="20" y="42" width="150" height="50" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="95" y="63" text-anchor="middle" font-family="Arial" font-size="12" fill="#991b1b">Parent renders</text>
  <text x="95" y="81" text-anchor="middle" font-family="Arial" font-size="10" fill="#dc2626">creates new fn every time</text>

  <line x1="170" y1="67" x2="205" y2="67" stroke="#dc2626" stroke-width="2" marker-end="url(#cb1)"/>

  <!-- Without: child re-renders -->
  <rect x="205" y="42" width="150" height="50" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="280" y="63" text-anchor="middle" font-family="Arial" font-size="12" fill="#991b1b">New fn reference!</text>
  <text x="280" y="81" text-anchor="middle" font-family="Arial" font-size="10" fill="#dc2626">child re-renders unnecessarily</text>

  <!-- With: Parent renders -->
  <rect x="380" y="42" width="150" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="455" y="63" text-anchor="middle" font-family="Arial" font-size="12" fill="#166534">Parent renders</text>
  <text x="455" y="81" text-anchor="middle" font-family="Arial" font-size="10" fill="#16a34a">deps unchanged</text>

  <line x1="530" y1="67" x2="565" y2="67" stroke="#16a34a" stroke-width="2" marker-end="url(#cb2)"/>

  <!-- With: same fn -->
  <rect x="565" y="42" width="115" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="622" y="63" text-anchor="middle" font-family="Arial" font-size="12" fill="#166534">Same fn ref</text>
  <text x="622" y="81" text-anchor="middle" font-family="Arial" font-size="10" fill="#16a34a">child skips render!</text>

  <!-- Code block -->
  <rect x="20" y="118" width="660" height="72" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="350" y="140" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#334155">const handleClick = useCallback(() => {</text>
  <text x="350" y="158" text-anchor="middle" font-family="Arial" font-size="13" fill="#334155">  doSomething(id)</text>
  <text x="350" y="178" text-anchor="middle" font-family="Arial" font-size="13" fill="#334155">}, [id])   // only recreates when id changes</text>

  <text x="350" y="205" text-anchor="middle" font-family="Arial" font-size="11" fill="#94a3b8">useCallback caches a function — same as useMemo but specifically for functions</text>
</svg>
