<svg width="600" height="420" viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="600" height="420" fill="#fff" rx="12"/>
  
  <text x="300" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">SQL SELF JOIN</text>
  <text x="300" y="65" text-anchor="middle" font-size="14" fill="#7f8c8d">A table joined with itself (requires table aliases)</text>
  <text x="300" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#8e44ad">Concept: Employees and their Managers</text>

  <text x="300" y="120" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Source Table: 'Employees'</text>

  <rect x="50" y="140" width="180" height="150" rx="8" fill="#f4f7f9" stroke="#3498db" stroke-width="2"/>
  <text x="140" y="165" text-anchor="middle" font-size="16" font-weight="bold" fill="#2980b9">Alias 'E' (Employee)</text>
  <line x1="60" y1="175" x2="220" y2="175" stroke="#eee" stroke-width="1"/>
  
  <g font-size="12" fill="#333">
    <text x="65" y="200">ID 1: Alice (Mgr 2)</text>
    <text x="65" y="230" fill="#8e44ad" font-weight="bold">ID 2: Bob (Mgr NULL)</text>
    <text x="65" y="260">ID 3: Charlie (Mgr 2)</text>
    <text x="65" y="280">ID 4: David (Mgr 1)</text>
  </g>

  <rect x="370" y="140" width="180" height="150" rx="8" fill="#fffcf9" stroke="#e67e22" stroke-width="2"/>
  <text x="460" y="165" text-anchor="middle" font-size="16" font-weight="bold" fill="#d35400">Alias 'M' (Manager)</text>
  <line x1="380" y1="175" x2="540" y2="175" stroke="#eee" stroke-width="1"/>
  
  <g font-size="12" fill="#333">
    <text x="385" y="200" fill="#8e44ad" font-weight="bold">ID 1: Alice (Mgr 2)</text>
    <text x="385" y="230">ID 2: Bob (Mgr NULL)</text>
    <text x="385" y="260">ID 3: Charlie (Mgr 2)</text>
    <text x="385" y="280">ID 4: David (Mgr 1)</text>
  </g>

  <path d="M 230,260 C 300,260 300,230 370,230" stroke="#8e44ad" stroke-width="2" fill="none" marker-end="url(#dot)"/>
  <text x="300" y="255" text-anchor="middle" font-size="11" fill="#8e44ad" font-style="italic">E.mgr_id = M.id</text>

  <path d="M 230,200 C 300,200 300,230 370,230" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="3,3" fill="none"/>

  <path d="M 300,290 L 300,320" stroke="#bdc3c7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <rect x="100" y="330" width="400" height="75" rx="8" fill="white" stroke="#2c3e50" stroke-width="2"/>
  <text x="115" y="350" font-size="13" font-weight="bold" fill="#2c3e50">Result Set (Employee and their Direct Manager):</text>
  
  <g font-size="12" fill="#333">
    <text x="115" y="375">Alice (ID 1) reports to Bob (ID 2)</text>
    <text x="115" y="395">Charlie (ID 3) reports to Bob (ID 2)</text>
    <text x="485" y="395" text-anchor="end" font-size="11" fill="#7f8c8d" font-style="italic">(Note: Bob is missing as he has no manager)</text>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bdc3c7" />
    </marker>
    <marker id="dot" markerWidth="10" markerHeight="10" refX="5" refY="5">
      <circle cx="5" cy="5" r="3" fill="#8e44ad" />
    </marker>
  </defs>
</svg>
