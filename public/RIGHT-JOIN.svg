<svg width="600" height="420" viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="600" height="420" fill="#fffaf5" rx="12"/>
  
  <text x="300" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">SQL RIGHT JOIN</text>
  <text x="300" y="65" text-anchor="middle" font-size="14" fill="#546e7a">All rows from Right table + matching rows from Left table</text>

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <clipPath id="overlapRight">
      <circle cx="360" cy="180" r="90" />
    </clipPath>
  </defs>

  <circle cx="240" cy="180" r="90" fill="white" stroke="#3498db" stroke-width="3" stroke-dasharray="6,3"/>
  <text x="170" y="150" font-size="15" font-weight="bold" fill="#2980b9">Employees</text>
  <text x="170" y="170" font-size="11" fill="#2980b9">(Table A)</text>

  <circle cx="360" cy="180" r="90" fill="#e67e22" fill-opacity="0.8" stroke="#d35400" stroke-width="4" filter="url(#glow)"/>
  <text x="340" y="150" font-size="15" font-weight="bold" fill="white">Departments</text>
  <text x="340" y="170" font-size="11" fill="white">(Table B - Source)</text>

  <circle cx="240" cy="180" r="90" fill="#d35400" fill-opacity="0.3" clip-path="url(#overlapRight)"/>
  <text x="300" y="185" text-anchor="middle" font-size="12" font-weight="bold" fill="white">MATCH</text>

  <path d="M 300,275 L 300,300" stroke="#d35400" stroke-width="2" fill="none" stroke-dasharray="4,2"/>

  <rect x="80" y="310" width="440" height="90" rx="8" fill="white" stroke="#e67e22" stroke-width="2"/>
  <text x="95" y="335" font-size="13" font-weight="bold" fill="#2c3e50">Output Table:</text>
  
  <text x="95" y="360" font-size="12" fill="#2c3e50">ID 10: IT</text>
  <text x="210" y="360" font-size="12" fill="#27ae60">✓ Matched</text>
  <text x="330" y="360" font-size="12" fill="#7f8c8d">Emp: Alice</text>
  
  <text x="95" y="380" font-size="12" fill="#2c3e50">ID 40: Finance</text>
  <text x="210" y="380" font-size="12" fill="#e67e22">✗ No Employees</text>
  <text x="330" y="380" font-size="12" fill="#3498db" font-weight="bold">Emp: NULL</text>
</svg>
