<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="600" height="400" fill="#f8f9fa" rx="10"/>
  
  <text x="300" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">SQL INNER JOIN</text>
  <text x="300" y="65" text-anchor="middle" font-size="14" fill="#7f8c8d">Returns only rows where there is a match in both tables</text>

  <defs>
    <clipPath id="overlap">
      <circle cx="240" cy="180" r="90" />
    </clipPath>
  </defs>

  <circle cx="240" cy="180" r="90" fill="#3498db" fill-opacity="0.2" stroke="#2980b9" stroke-width="3"/>
  <text x="180" y="160" font-size="16" font-weight="bold" fill="#2980b9">Employees</text>
  <text x="160" y="180" font-size="12" fill="#2980b9">dept_id: 10, 20, 30</text>

  <circle cx="360" cy="180" r="90" fill="#e67e22" fill-opacity="0.2" stroke="#d35400" stroke-width="3"/>
  <text x="340" y="160" font-size="16" font-weight="bold" fill="#d35400">Departments</text>
  <text x="360" y="180" font-size="12" fill="#d35400">id: 10, 20, 40</text>

  <circle cx="360" cy="180" r="90" fill="#2ecc71" fill-opacity="0.8" clip-path="url(#overlap)"/>
  <text x="300" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">MATCH</text>

  <line x1="300" y1="270" x2="300" y2="300" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  
  <rect x="150" y="310" width="300" height="60" rx="5" fill="white" stroke="#2ecc71" stroke-width="2"/>
  <text x="300" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">Result Set (Matched Records Only)</text>
  
  <text x="160" y="355" font-size="12" fill="#2c3e50">ID 10: Alice (IT)</text>
  <text x="250" y="355" font-size="12" fill="#2c3e50">ID 20: Bob (HR)</text>
  <text x="440" y="355" text-anchor="end" font-size="11" fill="#e74c3c" font-style="italic">IDs 30 &amp; 40 Excluded</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bdc3c7" />
    </marker>
  </defs>
</svg>
