<svg width="600" height="420" viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="600" height="420" fill="#f8f9fa" rx="12"/>
  
  <text x="300" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">SQL CROSS JOIN</text>
  <text x="300" y="65" text-anchor="middle" font-size="14" fill="#546e7a">Cartesian Product: Every row from Table A paired with every row from Table B</text>
  <text x="300" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#27ae60">Result: 3 × 3 = 9 Rows</text>

  <rect x="50" y="110" width="100" height="120" rx="8" fill="white" stroke="#3498db" stroke-width="2"/>
  <text x="100" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#2980b9">Colors (A)</text>
  <line x1="60" y1="135" x2="140" y2="135" stroke="#eee" stroke-width="1"/>
  
  <text x="100" y="160" text-anchor="middle" font-size="12" fill="#333">Red</text>
  <text x="100" y="190" text-anchor="middle" font-size="12" fill="#333">Blue</text>
  <text x="100" y="220" text-anchor="middle" font-size="12" fill="#333">Green</text>

  <rect x="50" y="260" width="100" height="120" rx="8" fill="white" stroke="#e67e22" stroke-width="2"/>
  <text x="100" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#d35400">Sizes (B)</text>
  <line x1="60" y1="285" x2="140" y2="285" stroke="#eee" stroke-width="1"/>
  
  <text x="100" y="310" text-anchor="middle" font-size="12" fill="#333">Small (S)</text>
  <text x="100" y="340" text-anchor="middle" font-size="12" fill="#333">Medium (M)</text>
  <text x="100" y="370" text-anchor="middle" font-size="12" fill="#333">Large (L)</text>

  <path d="M 160,170 C 200,170 200,240 240,240" stroke="#bdc3c7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 160,320 C 200,320 200,240 240,240" stroke="#bdc3c7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <rect x="250" y="110" width="300" height="270" rx="8" fill="white" stroke="#27ae60" stroke-width="3"/>
  <text x="400" y="135" text-anchor="middle" font-size="16" font-weight="bold" fill="#27ae60">Result Matrix</text>
  
  <line x1="350" y1="150" x2="350" y2="380" stroke="#eee" stroke-width="1"/>
  <line x1="450" y1="150" x2="450" y2="380" stroke="#eee" stroke-width="1"/>
  <line x1="250" y1="195" x2="550" y2="195" stroke="#eee" stroke-width="1"/>
  <line x1="250" y1="260" x2="550" y2="260" stroke="#eee" stroke-width="1"/>
  <line x1="250" y1="325" x2="550" y2="325" stroke="#eee" stroke-width="1"/>

  <text x="300" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#d35400">Size S</text>
  <text x="400" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#d35400">Size M</text>
  <text x="500" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#d35400">Size L</text>

  <text x="185" y="230" font-size="12" font-weight="bold" fill="#2980b9">Color Red</text>
  <text x="185" y="295" font-size="12" font-weight="bold" fill="#2980b9">Color Blue</text>
  <text x="175" y="360" font-size="12" font-weight="bold" fill="#2980b9">Color Green</text>

  <text x="300" y="230" text-anchor="middle" font-size="11" fill="#333">Red, S</text>
  <text x="400" y="230" text-anchor="middle" font-size="11" fill="#333">Red, M</text>
  <text x="500" y="230" text-anchor="middle" font-size="11" fill="#333">Red, L</text>
  
  <text x="300" y="295" text-anchor="middle" font-size="11" fill="#333">Blue, S</text>
  <text x="400" y="295" text-anchor="middle" font-size="11" fill="#333">Blue, M</text>
  <text x="500" y="295" text-anchor="middle" font-size="11" fill="#333">Blue, L</text>

  <text x="300" y="360" text-anchor="middle" font-size="11" fill="#333">Green, S</text>
  <text x="400" y="360" text-anchor="middle" font-size="11" fill="#333">Green, M</text>
  <text x="500" y="360" text-anchor="middle" font-size="11" fill="#333">Green, L</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bdc3c7" />
    </marker>
  </defs>
</svg>
